<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styling.css" />
    <title>Coffee Beans Selection</title>
  </head>
  <body>
    <p class="subtitle">Coffee · Beans</p>
    <p id="items">Please browse our selection of curated coffee beans.</p>
    <!-- PRODUCTS -->
    <div id="product-wrapper">
      <div class="products">
        <div class="caption-container">
          <img
            src="./Images/blaze.jpg"
            alt="Picture of coffee beans called Blaze."
          />
          <div class="caption">
            <a
              href="https://www.youtube.com/embed/MpYy6wwqxoo?si=QK_tnj2kMUPtz3ga"
              target="webpage"
              class="more"
              aria-label="More details on Blaze."
              >More info</a
            >
          </div>
        </div>
        <p class="itemnames">Blaze</p>
        <p class="prices">From £11.99</p>
      </div>
      <div class="products">
        <div class="caption-container">
          <img
            src="./Images/sunshine.jpg"
            alt="Photo of coffee beans called Sunshine."
          />
          <div class="caption">
            <a
              href="https://www.youtube.com/embed/rTga41r3a4s?si=kPriLgWd2HvuPsBd"
              target="webpage"
              class="more"
              aria-label="More details on Sunshine."
              >More info</a
            >
          </div>
        </div>
        <p class="itemnames">Sunshine</p>
        <p class="prices">From £13.99</p>
      </div>
      <div class="products">
        <div class="caption-container">
          <img
            src="./Images/summit.jpg"
            alt="Picture of coffee beans called Summit."
          />
          <div class="caption">
            <a
              href="https://www.youtube.com/embed/H6FUBWGSOIc?si=n18MNmFHMKYvHCJd"
              target="webpage"
              class="more"
              aria-label="More details on Summit."
              >More info</a
            >
          </div>
        </div>
        <p class="itemnames">Summit</p>
        <p class="prices">From £19.99</p>
      </div>
    </div>
  </body>
</html>
