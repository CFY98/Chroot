<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/pages.css" />
    <title>Equipment</title>
  </head>
  <body>
    <p class="subtitle">Brewing Equipment</p>
    <!-- PRODUCTS -->
    <div id="product-wrapper">
      <p id="items" class="fadein">
        Please browse our selection for the best cups of coffee
      </p>
      <div class="products">
        <div class="caption-container">
          <img
            src="/Images/filters.jpg"
            alt="Chroot Filters Photo"
            class="fadein"
          />
          <div class="caption">
            <a
              class="more"
              aria-label="More information on our Chroot Filters."
              href="/filters"
              data-link
              >More info</a
            >
          </div>
        </div>
        <div class="information fadein">
          <p class="itemnames">Filters</p>
          <p class="prices">£9.99</p>
        </div>
      </div>
      <div class="products">
        <div class="caption-container">
          <img
            src="/Images/dripper.jpg"
            alt="Plastic Chroot Dripper Photo"
            class="fadein"
          />
          <div class="caption">
            <a
              class="more"
              aria-label="More information on our Coffee Dripper."
              href="/dripper"
              data-link
              >More info</a
            >
          </div>
        </div>
        <div class="information fadein">
          <p class="itemnames">Dripper</p>
          <p class="prices">£14.99</p>
        </div>
      </div>
      <div class="products">
        <div class="caption-container">
          <img
            src="/Images/grinder.jpg"
            alt="Chroot Coffee Grinder Photo"
            class="fadein"
          />
          <div class="caption">
            <a
              class="more"
              aria-label="More information on our Chroot Coffee Grinder."
              href="/grinder"
              data-link=""
              >More info</a
            >
          </div>
        </div>
        <div class="information fadein">
          <p class="itemnames">Grinder</p>
          <p class="prices">£129.99</p>
        </div>
      </div>
    </div>
  </body>
</html>
