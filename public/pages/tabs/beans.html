<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/pages.css" />
    <title>Coffee Beans Selection</title>
  </head>
  <body>
    <p class="subtitle">Coffee Beans</p>
    <!-- PRODUCTS -->
    <div id="product-wrapper">
      <p id="items" class="fadein">
        Please browse our curated selection of coffee beans
      </p>
      <div class="products">
        <div class="caption-container">
          <img
            src="/Images/blaze.jpg"
            alt="Picture of coffee beans called Blaze."
            class="fadein"
          />
          <div class="caption">
            <a
              class="more"
              aria-label="More information on Blaze."
              href="/blaze"
              data-link
              >More info</a
            >
          </div>
        </div>
        <div class="information fadein">
          <p class="itemnames">Blaze (200g)</p>
          <p class="prices">£11.99</p>
        </div>
      </div>
      <div class="products">
        <div class="caption-container">
          <img
            src="/Images/sunshine.jpg"
            alt="Photo of coffee beans called Sunshine."
            class="fadein"
          />
          <div class="caption">
            <a
              class="more"
              aria-label="More information on Summit."
              href="/sunshine"
              data-link
              >More info</a
            >
          </div>
        </div>
        <div class="information fadein">
          <p class="itemnames">Sunshine (200g)</p>
          <p class="prices">£14.99</p>
        </div>
      </div>
      <div class="products">
        <div class="caption-container">
          <img
            src="../Images/summit.jpg"
            alt="Picture of coffee beans called Summit."
            class="fadein"
          />
          <div class="caption">
            <a
              class="more"
              aria-label="More information on Summit."
              href="/summit"
              data-link
              >More info</a
            >
          </div>
        </div>
        <div class="information fadein">
          <p class="itemnames">Summit (150g)</p>
          <p class="prices">£19.99</p>
        </div>
      </div>
    </div>
  </body>
</html>
