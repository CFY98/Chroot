<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/product.css" />
    <title>Blaze</title>
  </head>
  <body>
    <p class="subtitle fadein">Blaze</p>
    <!-- PRODUCTS -->
    <div id="catalogue-wrapper" class="fadein">
      <div class="catalogue-container">
        <div class="catalogue-item">
          <img
            src="/Images/blaze.jpg"
            alt="Picture of coffee beans called Blaze."
          />
        </div>
        <div class="statistics">
          <p class="stats">
            Origin: <span class="result">Huila, Colombia</span>
          </p>
          <p class="stats">
            Varietal: <span class="result">Pink Bourbon</span>
          </p>
          <p class="stats">
            Altitude: <span class="result">1,600 — 1,900m</span>
          </p>
          <p class="stats">Process: <span class="result">Washed</span></p>
          <p class="stats">Roast: <span class="result">Light</span></p>
          <p class="stats">Harvest: <span class="result">March - June</span></p>
          <p class="stats">
            Notes: <span class="result">Melon, Lemonade, Peach</span>
          </p>
          <span><br /><br /></span>
          <p class="stats">Quantity: <span class="result">200g</span></p>
          <p class="stats">Price: <span class="result">£11.99</span></p>
        </div>
      </div>
      <div id="purchase">
        <div class="qty-counter">
          <div
            class="btn-plus"
            role="button"
            aria-label="Increases quantity by one"
          >
            +
          </div>
          <div class="counting" aria-label="Number of items to add to basket">
            1
          </div>
          <div
            class="btn-minus"
            role="button"
            aria-label="Increases quantity by one"
          >
            -
          </div>
        </div>
        <button class="buy" aria-label="click to add to basket">
          Add to Basket
        </button>
      </div>
      <div id="toastbox"></div>
    </div>
  </body>
</html>
