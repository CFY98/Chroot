<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summit</title>
  </head>
  <body>
    <p class="subtitle">Summit</p>
    <!-- PRODUCTS -->
    <div id="catalogue-wrapper">
      <div class="catalogue-container">
        <div class="catalogue-item">
          <img
            src="/Images/summit.jpg"
            alt="Picture of coffee beans called Summit."
          />
        </div>
        <div class="statistics">
          <p class="stats">
            Origin: <span class="result">Antigua, Guatemala</span>
          </p>
          <p class="stats">Varietal: <span class="result">Gesha</span></p>
          <p class="stats">
            Altitude: <span class="result">1,500 - 1700m</span>
          </p>
          <p class="stats">Process: <span class="result">Honey</span></p>
          <p class="stats">Roast: <span class="result">Light</span></p>
          <p class="stats">
            Harvest: <span class="result">December - March</span>
          </p>
          <p class="stats">
            Notes: <span class="result">Jasmine, Bergamot, Pear</span>
          </p>
          <span><br /><br /></span>
          <p class="stats">Quantity: <span class="result">150g</span></p>
          <p class="stats">Price: <span class="result">£19.99</span></p>
        </div>
      </div>
      <div id="purchase">
        <div class="qty-counter">
          <div
            class="btn-plus"
            role="button"
            aria-label="Increases quantity by one"
          >
            +
          </div>
          <div class="counting" aria-label="Number of items to add to basket">
            1
          </div>
          <div
            class="btn-minus"
            role="button"
            aria-label="Increases quantity by one"
          >
            -
          </div>
        </div>
        <button class="buy" aria-label="click to add to basket">
          Add to Basket
        </button>
      </div>
      <div id="toastbox"></div>
    </div>
  </body>
</html>
