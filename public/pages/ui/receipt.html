<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/receipt.css" />
    <link rel="stylesheet" href="/src/css/pdf.css" />
    <title>Receipt</title>
  </head>
  <body>
    <div id="invoice" class="fadein">
      <p class="subtitle">Invoice</p>
      <p id="thanks">Thank you for your purchase at Chroot!</p>
      <div class="receipt-container">
        <div class="bar">
          <p id="order">Order Number:</p>
          <p id="message"></p>
          <button id="print" aria-label="print PDF">Download</button>
        </div>
        <div class="receipt-items"></div>
        <hr />
        <div class="receipt-checkout">
          <div class="receipt-total">
            Total
            <div class="receipt-amount"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
