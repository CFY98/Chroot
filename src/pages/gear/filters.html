<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/product.css" />
    <title>Filters</title>
  </head>
  <body>
    <p class="subtitle">Filters</p>
    <!-- PRODUCTS -->
    <div id="catalogue-wrapper">
      <div class="catalogue-container">
        <div class="catalogue-item">
          <img
            src="/Images/filters.jpg"
            alt="Picture of coffee beans called Blaze."
          />
        </div>
        <div class="statistics">
          <p class="fluff">
            Our in-house filters are designed to fit household favourites such
            as the Hario V60, the Cafec Flower and our very own Chroot Dripper.
          </p>
          <span><br /><br /></span>
          <p class="stats">
            Quantity: <span class="result">100 filters per pack</span>
          </p>
          <p class="stats">Price: <span class="result">£9.99</span></p>
        </div>
      </div>
      <div id="purchase">
        <div class="qty-counter">
          <div
            class="btn-plus"
            role="button"
            aria-label="Increases quantity by one"
          >
            +
          </div>
          <div class="counting" aria-label="Number of items to add to basket">
            1
          </div>
          <div
            class="btn-minus"
            role="button"
            aria-label="Increases quantity by one"
          >
            -
          </div>
        </div>
        <button class="buy" aria-label="click to add to basket">
          Add to Basket
        </button>
      </div>
      <div id="toastbox"></div>
    </div>
  </body>
</html>
