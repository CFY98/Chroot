<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../styles/product.css" />
    <title>Blaze</title>
  </head>
  <body>
    <p class="subtitle">Sunshine</p>
    <!-- PRODUCTS -->
    <div id="catalogue-wrapper">
      <div class="catalogue-container">
        <div class="catalogue-item">
          <img
            src="../Images/sunshine.jpg"
            alt="Picture of coffee beans called Sunshine."
          />
        </div>
        <div class="statistics">
          <p class="stats">
            Origin: <span class="result">Yirgacheffe, Ethiopia</span>
          </p>
          <p class="stats">
            Varietal: <span class="result">Heirloom</span>
          </p>
          <p class="stats">
            Altitude: <span class="result">1,800 — 2,200m</span>
          </p>
          <p class="stats">
            Process: <span class="result">Natural</span>
          </p>
          <p class="stats">Roast: <span class="result">Light</span></p>
          <p class="stats">Harvest: <span class="result">November - January</span></p>
          <p class="stats">
            Notes: <span class="result">Blueberry, Toffee, Cherry</span>
          </p>
          <span><br><br></span>
          <p class="stats">Quantity: <span class="result">200g</span></p>
          <p class="stats">Price: <span class="result">£14.99</p>
          <button class="buy" aria-label="click to add to basket">
            Add to Basket
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
