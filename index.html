<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <title>Chroot - Home</title>
  </head>
  <body>
    <!-- TITLE CONTAINER -->
    <div class="top-container">
      <p class="title">Chroot</p>
      <div class="socials">
        <a href="https://github.com/CFY98/Chroot" class="fa fa-github"></a>
      </div>
    </div>
    <!-- TERMINAL CONTAINER -->
    <div class="container">
      <!-- Terminal Window -->
      <div class="terminal" role="region" aria-label="terminal navigation">
        <div class="titlebar">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
          <span class="titlebar-text">chroot - bash</span>
        </div>
        <!-- SUGGESTION BUTTONS -->
        <div
          class="suggestions"
          id="suggestions"
          aria-label="quick commands"
        ></div>
        <div class="input-row">
          <span class="prompt" aria-hidden="true"
            >site@chroot <span class="path"> ~ $</span></span
          >
          <input
            id="cmd-input"
            type="text"
            autocomplete="off"
            autocorrect="off"
            spellcheck="off"
            placeholder="type here"
            aria-label="terminal input"
          />
        </div>
        <div
          class="terminal-output"
          id="terminal-output"
          aria-live="polite"
        ></div>
      </div>
      <div class="webpage-container">
        <div class="titlebar">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
          <span class="titlebar-text">chroot - page</span>
        </div>
        <div class="webpage-link">
          <iframe
            name="webpage"
            id="page"
            src="/basket.html"
            frameborder="0"
            aria-label="page display"
          ></iframe>
        </div>
      </div>
    </div>
    <script type="module" src="terminal.js"></script>
  </body>
</html>
