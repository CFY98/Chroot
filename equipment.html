<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styling.css" />
    <title>Equipment</title>
  </head>
  <body>
    <p class="title">⬡ Equipment ⬡</p>
    <p id="items">
      Please browse our selection of items for drip or pour over coffee.
    </p>
    <!-- PASTRIES MENU -->
    <div id="food">
      <div class="pastries">
        <div class="caption-container">
          <img src="./Images/cinnamon_roll.jpeg" alt="Cinnamon Roll Photo" />
          <div class="caption">
            <a
              href="https://www.youtube.com/watch?v=UsI5U9WBMyU"
              class="info"
              aria-label="More details on our Cinnamon Rolls."
              >More Info</a
            >
          </div>
        </div>
        <p class="itemnames">Cinnamon Roll</p>
        <p class="prices">£3.75</p>
      </div>
      <div class="pastries">
        <div class="caption-container">
          <img
            src="./Images/pain_au_chocolat.jpeg"
            alt="Pain au Chocolat Photo"
          />
          <div class="caption">
            <a
              href="https://www.youtube.com/watch?v=79BRLkeyipk&pp=ygUeaG93IHRvIG1ha2UgYSBwYWluIGF1IGNob2NvbGF0"
              class="info"
              aria-label="More details on our Pain au Chocolat."
              >More Info</a
            >
          </div>
        </div>
        <p class="itemnames">Pain au Chocolat</p>
        <p class="prices">£2.80</p>
      </div>
      <div class="pastries">
        <div class="caption-container">
          <img src="./Images/croissant.jpeg" alt="Croissant Photo" />
          <div class="caption">
            <a
              href="https://www.youtube.com/watch?v=l-4hEBgfZxs"
              class="info"
              aria-label="More details on our Croissants."
              >More Info</a
            >
          </div>
        </div>
        <p class="itemnames">Croissant</p>
        <p class="prices">£2.80</p>
      </div>
    </div>
  </body>
</html>
