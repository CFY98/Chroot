<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styling.css" />
    <title>Equipment</title>
  </head>
  <body>
    <p class="subtitle">Equipment</p>
    <p id="items">
      Please browse our selection of items for drip or pour-over coffee.
    </p>
    <!-- PRODUCTS -->
    <div id="product-wrapper">
      <div class="products">
        <div class="caption-container">
          <img src="./Images/filters.jpg" alt="Chroot Filters Photo" />
          <div class="caption">
            <a
              href="https://youtu.be/uwUt1fVLb3E"
              target="webpage"
              class="more"
              aria-label="More details on our Chroot Filters."
              >More info</a
            >
          </div>
        </div>
        <p class="itemnames">Chroot Filters</p>
        <p class="prices">£9.99</p>
      </div>
      <div class="products">
        <div class="caption-container">
          <img src="./Images/dripper.jpg" alt="Plastic Chroot Dripper Photo" />
          <div class="caption">
            <a
              href="https://www.youtube.com/watch?v=rTga41r3a4s&pp=ygUjcmljayBhc3RsZXkgbmV2ZXIgZ29ubmEgZ2l2ZSB5b3UgdXA%3D"
              target="webpage"
              class="more"
              aria-label="More details on our Coffee Dripper."
              >More info</a
            >
          </div>
        </div>
        <p class="itemnames">Chroot Dripper</p>
        <p class="prices">£14.99</p>
      </div>
      <div class="products">
        <div class="caption-container">
          <img src="./Images/grinder.jpg" alt="Chroot Coffee Grinder Photo" />
          <div class="caption">
            <a
              href="https://youtu.be/avjI3_GIZBw"
              target="webpage"
              class="more"
              aria-label="More details on our Chroot Coffee Grinder."
              >More info</a
            >
          </div>
        </div>
        <p class="itemnames">Chroot Grinder</p>
        <p class="prices">£29.99</p>
      </div>
    </div>
  </body>
</html>
